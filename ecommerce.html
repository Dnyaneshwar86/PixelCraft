<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Store - Demo</title>
  <meta name="description" content="Pixel Craft - Professional 3D Web Design Agency by Dnyaneshwar Adagale. Custom web solutions, UI/UX, and Responsive Design.">
  <meta name="keywords" content="Web Design, Dnyaneshwar Adagale, Shrigonda Web Developer, 3D Website, UI UX Designer, Marathi Web Designer">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
  <a href="index.html" class="fixed top-5 left-5 bg-black text-white px-4 py-2 rounded-full z-[9999] shadow-lg">← Back to Portfolio</a>
  <header class="bg-white shadow-sm p-4 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-black text-indigo-600 tracking-tighter">ShopStyle.</h1>
      <nav class="hidden md:flex gap-6 font-semibold text-gray-600">
        <a href="#" class="hover:text-indigo-600">Men</a>
        <a href="#" class="hover:text-indigo-600">Women</a>
        <a href="#" class="hover:text-indigo-600">Accessories</a>
      </nav>
      <button class="bg-black text-white px-5 py-2 rounded-full font-bold hover:bg-gray-800 transition">Cart (2)</button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-6 mt-6">
    <h2 class="text-3xl font-bold mb-8">Trending Products</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
      
      <div class="bg-white p-4 rounded-2xl shadow-md hover:shadow-xl transition duration-300 transform hover:-translate-y-2">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500&q=80" class="rounded-xl mb-4 h-56 w-full object-cover">
        <h3 class="text-lg font-bold">Premium Smart Watch</h3>
        <p class="text-gray-500 text-sm mb-3">Tech Gadgets</p>
        <div class="flex justify-between items-center">
          <span class="text-xl font-black text-indigo-600">$199.00</span>
          <button class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-lg font-bold hover:bg-indigo-600 hover:text-white transition">Add</button>
        </div>
      </div>

      <div class="bg-white p-4 rounded-2xl shadow-md hover:shadow-xl transition duration-300 transform hover:-translate-y-2">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&q=80" class="rounded-xl mb-4 h-56 w-full object-cover">
        <h3 class="text-lg font-bold">Wireless Headphones</h3>
        <p class="text-gray-500 text-sm mb-3">Audio & Music</p>
        <div class="flex justify-between items-center">
          <span class="text-xl font-black text-indigo-600">$149.50</span>
          <button class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-lg font-bold hover:bg-indigo-600 hover:text-white transition">Add</button>
        </div>
      </div>

      <div class="bg-white p-4 rounded-2xl shadow-md hover:shadow-xl transition duration-300 transform hover:-translate-y-2">
        <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=500&q=80" class="rounded-xl mb-4 h-56 w-full object-cover">
        <h3 class="text-lg font-bold">Vintage Camera</h3>
        <p class="text-gray-500 text-sm mb-3">Photography</p>
        <div class="flex justify-between items-center">
          <span class="text-xl font-black text-indigo-600">$320.00</span>
          <button class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-lg font-bold hover:bg-indigo-600 hover:text-white transition">Add</button>
        </div>
      </div>

    </div>
  </main>
</body>
</html>
